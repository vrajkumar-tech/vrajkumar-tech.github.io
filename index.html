<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Your CV...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader-container {
            text-align: center;
            color: white;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .loader-subtext {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .fallback {
            margin-top: 3rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            max-width: 400px;
        }

        .fallback-title {
            font-size: 1rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .fallback-links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .fallback-link {
            padding: 0.75rem 1.5rem;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .fallback-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <div class="loader-text">Loading Your CV</div>
        <div class="loader-subtext">Selecting a random template...</div>
        
        <div class="fallback">
            <div class="fallback-title">Or choose a template:</div>
            <div class="fallback-links">
                <a href="./templates/index.html" class="fallback-link">View All Templates</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const templates = ['modern', 'classic', 'glass', 'animated', 'minimalist', 'default'];
            const randomIndex = Math.floor(Math.random() * templates.length);
            const selectedTemplate = templates[randomIndex];
            
            // Redirect to random template after a brief delay for visual feedback
            setTimeout(() => {
                window.location.href = `./templates/${selectedTemplate}/index.html`;
            }, 500);
        })();
    </script>
</body>
</html>
