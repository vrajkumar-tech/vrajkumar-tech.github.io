    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --text-light: rgba(255, 255, 255, 0.6);
            --accent-1: #667eea;
            --accent-2: #764ba2;
            --accent-3: #f093fb;
            --accent-4: #4facfe;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23ffffff' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        .section {
            padding: 5rem 0;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }

        .hero__content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .hero__text {
            animation: fadeInLeft 1s ease-out;
        }

        .hero__eyebrow {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        .hero__title {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
        }

        .hero__title-accent {
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero__summary {
            font-size: 1.125rem;
            line-height: 1.8;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .hero__actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            border: 1px solid var(--glass-border);
        }

        .btn--glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            color: white;
        }

        .btn--glass:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .hero__image-wrapper {
            position: relative;
            animation: fadeInRight 1s ease-out;
        }

        .hero__image-glass {
            padding: 2rem;
            border-radius: 2rem;
        }

        .hero__profile-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .hero__stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .hero__stat {
            text-align: center;
            padding: 1.5rem;
            border-radius: 1rem;
        }

        .hero__stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .hero__stat-label {
            font-size: 0.75rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .hero__socials {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .hero__social-link {
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            color: white;
            font-size: 1.25rem;
            transition: all 0.3s ease;
        }

        .hero__social-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        /* Section Headers */
        .section__header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section__eyebrow {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        .section__title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
        }

        /* About Section */
        .about__content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        .about__narrative {
            padding: 2rem;
            border-radius: 1.5rem;
        }

        .about__paragraph {
            margin-bottom: 1.5rem;
            line-height: 1.8;
            opacity: 0.9;
        }

        .about__highlights {
            display: grid;
            gap: 1.5rem;
        }

        .about__highlight {
            padding: 1.5rem;
            border-radius: 1rem;
            transition: all 0.3s ease;
        }

        .about__highlight:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(10px);
        }

        .about__highlight-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .about__highlight-description {
            opacity: 0.85;
            line-height: 1.6;
        }

        /* Timeline */
        .timeline {
            max-width: 900px;
            margin: 0 auto;
        }

        .timeline-item {
            margin-bottom: 3rem;
            position: relative;
        }

        .timeline-item__content {
            padding: 2rem;
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .timeline-item__content:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .timeline-item__company {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .timeline-item__logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.9);
            padding: 0.5rem;
            border-radius: 1rem;
        }

        .timeline-item__company-name {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .timeline-item__period {
            opacity: 0.8;
            font-size: 0.875rem;
        }

        .timeline-item__summary {
            opacity: 0.85;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .role-item {
            border-left: 3px solid rgba(255, 255, 255, 0.3);
            padding-left: 1.5rem;
            margin-bottom: 2rem;
        }

        .role-item__position {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .role-item__period {
            opacity: 0.7;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .role-item__achievements {
            list-style: none;
            margin-bottom: 1rem;
        }

        .role-item__achievements li {
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
            position: relative;
            opacity: 0.85;
            line-height: 1.6;
        }

        .role-item__achievements li::before {
            content: '→';
            position: absolute;
            left: 0;
            font-weight: 700;
        }

        .skill-tag {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            padding: 0.375rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Capabilities */
        .capability-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .capability-card {
            padding: 2rem;
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .capability-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .capability-card__header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .capability-card__icon {
            width: 3rem;
            height: 3rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .capability-card__title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .capability-card__description {
            opacity: 0.85;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .capability-skill {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
        }

        .capability-skill::before {
            content: '✓';
            font-weight: 700;
        }

        /* Certifications */
        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .cert-card {
            padding: 2rem;
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .cert-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .cert-card__title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .cert-card__issuer {
            opacity: 0.8;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .cert-card__description {
            opacity: 0.85;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .cert-card__verification {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }

        .cert-card__verification:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Education */
        .education__items {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .education-item {
            padding: 2rem;
            border-radius: 1.5rem;
            border-left: 4px solid rgba(255, 255, 255, 0.5);
        }

        .education-item__header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.5rem;
        }

        .education-item__degree {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .education-item__period {
            opacity: 0.8;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .education-item__field {
            font-weight: 600;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }

        .education-item__institution {
            opacity: 0.8;
            margin-bottom: 0.75rem;
        }

        .education-item__description {
            opacity: 0.7;
            font-size: 0.875rem;
            line-height: 1.6;
        }

        /* Insights */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .blog-card {
            padding: 2rem;
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .blog-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .blog-card__badge {
            display: inline-block;
            padding: 0.375rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.2);
        }

        .blog-card__title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .blog-card__description {
            opacity: 0.85;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .blog-card__link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: gap 0.3s ease;
        }

        .blog-card__link:hover {
            gap: 0.75rem;
        }

        /* Contact */
        .contact__content {
            max-width: 800px;
            margin: 0 auto;
        }

        .contact__details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .contact-detail {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 1rem;
        }

        .contact-detail i {
            font-size: 1.5rem;
        }

        .contact-detail a {
            color: white;
            text-decoration: none;
        }

        .form__group {
            margin-bottom: 1.5rem;
        }

        .form__label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form__input,
        .form__select {
            width: 100%;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            transition: all 0.3s ease;
        }

        .form__input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form__input:focus,
        .form__select:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        /* Footer */
        .footer {
            padding: 3rem 0 1.5rem;
            text-align: center;
        }

        .footer__logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .footer__tagline {
            opacity: 0.7;
            margin-bottom: 1.5rem;
        }

        .footer__socials {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .footer__social-link {
            color: white;
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.3s ease;
            font-size: 0.875rem;
        }

        .footer__social-link:hover {
            opacity: 1;
        }

        .footer__bottom {
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0.7;
            font-size: 0.875rem;
        }

        /* Animations */
        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero__content {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .hero__title {
                font-size: 2.5rem;
            }

            .hero__stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .about__content {
                grid-template-columns: 1fr;
            }

            .section__title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero__content">
                <div class="hero__text">
                    <div class="hero__eyebrow"></div>
                    <h1 class="hero__title"></h1>
                    <p class="hero__summary"></p>
                    <div class="hero__actions">
                        <a href="#" class="btn btn--glass" download>
                            <i class='bx bx-download'></i>
                            Download Resume
                        </a>
                        <a href="#contact" class="btn btn--glass">
                            <i class='bx bx-envelope'></i>
                            Get In Touch
                        </a>
                    </div>
                    <div class="hero__socials"></div>
                </div>
                <div class="hero__image-wrapper">
                    <div class="hero__image-glass glass">
                        <img src="" alt="Profile" class="hero__profile-img">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Stats -->
    <section class="section">
        <div class="container">
            <div class="hero__stats"></div>
        </div>
    </section>

    <!-- About -->
    <section id="about" class="section">
        <div class="container">
            <div class="section__header">
                <div class="section__eyebrow"></div>
                <h2 class="section__title"></h2>
            </div>
            <div class="about__content">
                <div class="about__narrative glass"></div>
                <div class="about__highlights"></div>
            </div>
        </div>
    </section>

    <!-- Experience -->
    <section id="experience" class="section">
        <div class="container">
            <div class="section__header">
                <div class="section__eyebrow">Career Journey</div>
                <h2 class="section__title">Professional Experience</h2>
            </div>
            <div class="timeline"></div>
        </div>
    </section>

    <!-- Capabilities -->
