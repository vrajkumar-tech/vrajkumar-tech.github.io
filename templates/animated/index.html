    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --accent-color: #ffe66d;
            --dark-bg: #1a1a2e;
            --darker-bg: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #a8b2d1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text-primary);
            background: var(--dark-bg);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section {
            padding: 5rem 0;
            position: relative;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--primary-color) 0%, transparent 70%);
            opacity: 0.15;
            top: -250px;
            right: -250px;
            animation: float 20s ease-in-out infinite;
        }

        .animated-bg::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--secondary-color) 0%, transparent 70%);
            opacity: 0.15;
            bottom: -200px;
            left: -200px;
            animation: float 15s ease-in-out infinite reverse;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
        }

        .hero__content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .hero__text {
            opacity: 0;
            animation: slideInLeft 1s ease-out 0.3s forwards;
        }

        .hero__eyebrow {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--secondary-color);
            margin-bottom: 1rem;
            display: inline-block;
            animation: glow 2s ease-in-out infinite;
        }

        .hero__title {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease infinite;
        }

        .hero__summary {
            font-size: 1.125rem;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .hero__actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn--primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }

        .btn--primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.4);
        }

        .btn--secondary {
            background: transparent;
            color: var(--secondary-color);
            border: 2px solid var(--secondary-color);
        }

        .btn--secondary:hover {
            background: var(--secondary-color);
            color: var(--dark-bg);
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .hero__image {
            position: relative;
            opacity: 0;
            animation: slideInRight 1s ease-out 0.5s forwards;
        }

        .hero__profile-wrapper {
            position: relative;
            display: inline-block;
        }

        .hero__profile-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 2;
            animation: float 6s ease-in-out infinite;
        }

        .hero__profile-wrapper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            border-radius: 2rem;
            z-index: 1;
            animation: rotate 10s linear infinite;
            opacity: 0.5;
        }

        .hero__stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }

        .hero__stat {
            text-align: center;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .hero__stat:nth-child(1) { animation-delay: 0.8s; }
        .hero__stat:nth-child(2) { animation-delay: 1s; }
        .hero__stat:nth-child(3) { animation-delay: 1.2s; }
        .hero__stat:nth-child(4) { animation-delay: 1.4s; }

        .hero__stat:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: var(--secondary-color);
        }

        .hero__stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero__stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .hero__socials {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .hero__social-link {
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 1.25rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero__social-link:hover {
            background: var(--secondary-color);
            color: var(--dark-bg);
            transform: translateY(-3px) rotate(5deg);
        }

        /* Section Headers */
        .section__header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section__eyebrow {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
        }

        .section__title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* About Section */
        .about__content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        .about__narrative {
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            border-left: 4px solid var(--secondary-color);
        }

        .about__paragraph {
            margin-bottom: 1.5rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .about__highlights {
            display: grid;
            gap: 1.5rem;
        }

        .about__highlight {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .about__highlight::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .about__highlight:hover::before {
            left: 100%;
        }

        .about__highlight:hover {
            border-color: var(--secondary-color);
            transform: translateX(10px);
        }

        .about__highlight-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .about__highlight-description {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Timeline */
        .timeline {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 2rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary-color), var(--secondary-color));
        }

        .timeline-item {
            position: relative;
            padding-left: 5rem;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 1.5rem;
            top: 0.5rem;
            width: 1rem;
            height: 1rem;
            background: var(--secondary-color);
            border: 3px solid var(--dark-bg);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--secondary-color);
            animation: pulse 2s infinite;
        }

        .timeline-item__content {
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .timeline-item__content:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--secondary-color);
            transform: translateY(-5px);
        }

        .timeline-item__company {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .timeline-item__logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: white;
            padding: 0.5rem;
            border-radius: 0.75rem;
        }

        .timeline-item__company-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .timeline-item__period {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .timeline-item__summary {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .role-item {
            border-left: 3px solid var(--secondary-color);
            padding-left: 1.5rem;
            margin-bottom: 2rem;
        }

        .role-item__position {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .role-item__period {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .role-item__achievements {
            list-style: none;
            margin-bottom: 1rem;
        }

        .role-item__achievements li {
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
            position: relative;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .role-item__achievements li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--secondary-color);
            font-weight: 700;
        }

        .skill-tag {
            background: rgba(78, 205, 196, 0.2);
            color: var(--secondary-color);
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--secondary-color);
            display: inline-block;
            margin: 0.25rem;
            transition: all 0.3s ease;
        }

        .skill-tag:hover {
            background: var(--secondary-color);
            color: var(--dark-bg);
            transform: scale(1.05);
        }

        /* Capabilities */
        .capability-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .capability-card {
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .capability-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }

        .capability-card:hover::before {
            left: 100%;
        }

        .capability-card:hover {
            border-color: var(--secondary-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.2);
        }

        .capability-card__header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .capability-card__icon {
            width: 3rem;
            height: 3rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .capability-card__title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .capability-card__description {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .capability-skill {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }

        .capability-skill:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .capability-skill::before {
            content: '✓';
            color: var(--secondary-color);
            font-weight: 700;
        }

        /* Certifications */
        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .cert-card {
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .cert-card:hover {
            border-color: var(--secondary-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.2);
        }

        .cert-card__title {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .cert-card__issuer {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .cert-card__description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .cert-card__verification {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        .cert-card__verification:hover {
            gap: 0.75rem;
        }

        /* Education */
        .education__items {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .education-item {
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            border-left: 4px solid var(--secondary-color);
            transition: all 0.3s ease;
        }

        .education-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(10px);
        }

        .education-item__header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.5rem;
        }

        .education-item__degree {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .education-item__period {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .education-item__field {
            color: var(--secondary-color);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .education-item__institution {
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .education-item__description {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.6;
            opacity: 0.8;
        }

        /* Insights */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .blog-card {
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .blog-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .blog-card:hover::before {
            transform: scaleX(1);
        }

        .blog-card:hover {
            border-color: var(--secondary-color);
            transform: translateY(-5px);
        }

        .blog-card__badge {
            display: inline-block;
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            background: rgba(78, 205, 196, 0.2);
            color: var(--secondary-color);
            border: 1px solid var(--secondary-color);
        }

        .blog-card__title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .blog-card__description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .blog-card__link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
            transition: gap 0.3s ease;
        }

        .blog-card__link:hover {
            gap: 0.75rem;
        }

        /* Contact */
        .contact__content {
            max-width: 800px;
            margin: 0 auto;
        }

        .contact__details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .contact-detail {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .contact-detail:hover {
            border-color: var(--secondary-color);
            transform: translateY(-3px);
        }

        .contact-detail i {
            color: var(--secondary-color);
            font-size: 1.5rem;
        }

        .contact-detail a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .form__group {
            margin-bottom: 1.5rem;
        }

        .form__label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form__input,
        .form__select {
            width: 100%;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .form__input::placeholder {
            color: var(--text-secondary);
        }

        .form__input:focus,
        .form__select:focus {
            outline: none;
            border-color: var(--secondary-color);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Footer */
        .footer {
            padding: 3rem 0 1.5rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer__logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .footer__tagline {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .footer__socials {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .footer__social-link {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 0.875rem;
        }

        .footer__social-link:hover {
            color: var(--secondary-color);
        }

        .footer__bottom {
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px var(--secondary-color); }
            50% { text-shadow: 0 0 20px var(--secondary-color), 0 0 30px var(--secondary-color); }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px var(--secondary-color);
            }
            50% {
                box-shadow: 0 0 30px var(--secondary-color), 0 0 40px var(--secondary-color);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero__content {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .hero__title {
                font-size: 2.5rem;

            .hero__stats {

            }

            .section__title {

            }

            .timeline::before {
                left: 1rem;
            }

            .timeline-item {
                padding-left: 3.5rem;
            }

            .timeline-item::before {
                left: 0.75rem;
            }
        }
    </style>
</head>

    <script>
        const renderer = new CVRenderer();
        
        // Add scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.addEventListener('DOMContentLoaded', () => {
            const animatedElements = document.querySelectorAll('.capability-card, .cert-card, .blog-card');
            animatedElements.forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(30px)';
                el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                observer.observe(el);
            });
        });
    </script>
