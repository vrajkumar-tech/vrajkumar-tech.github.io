    <style>
        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --secondary-color: #8b5cf6;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-light: #9ca3af;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-accent: #f3f4f6;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text-primary);
            background: var(--bg-secondary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section {
            padding: 5rem 0;
        }

        .section__header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section__eyebrow {
            color: var(--primary-color);
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .section__title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .section__subtitle {
            font-size: 1.125rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.3;
        }

        .hero__content {
            position: relative;
            z-index: 1;
            color: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .hero__text {
            animation: fadeInUp 0.8s ease-out;
        }

        .hero__eyebrow {
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        .hero__title {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .hero__title-accent {
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero__summary {
            font-size: 1.25rem;
            line-height: 1.8;
            opacity: 0.95;
            margin-bottom: 2rem;
        }

        .hero__actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn--primary {
            background: white;
            color: var(--primary-color);
        }

        .btn--primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn--secondary {
            background: transparent;
            color: white;
            border-color: white;
        }

        .btn--secondary:hover {
            background: white;
            color: var(--primary-color);
        }

        .hero__image {
            position: relative;
            animation: fadeInRight 0.8s ease-out;
        }

        .hero__profile-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 8px solid rgba(255, 255, 255, 0.1);
        }

        .hero__stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            margin-top: 3rem;
            padding-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .hero__stat {
            text-align: center;
        }

        .hero__stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .hero__stat-label {
            font-size: 0.875rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .hero__socials {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .hero__social-link {
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.3s ease;
            font-size: 0.875rem;
        }

        .hero__social-link:hover {
            opacity: 1;
        }

        /* About Section */
        .about {
            background: var(--bg-primary);
        }

        .about__content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }

        .about__narrative {
            font-size: 1.125rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .about__paragraph {
            margin-bottom: 1.5rem;
        }

        .about__highlights {
            display: grid;
            gap: 2rem;
        }

        .about__highlight {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-radius: 1rem;
            transition: all 0.3s ease;
        }

        .about__highlight:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .about__highlight-icon {
            width: 3rem;
            height: 3rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .about__highlight-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .about__highlight-description {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Experience Section */
        .experience {
            background: var(--bg-secondary);
        }

        .timeline {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 2rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary-color), var(--secondary-color));
        }

        .timeline-item {
            position: relative;
            padding-left: 5rem;
            margin-bottom: 3rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 1.375rem;
            top: 0.5rem;
            width: 1.25rem;
            height: 1.25rem;
            background: var(--primary-color);
            border: 4px solid var(--bg-secondary);
            border-radius: 50%;
            box-shadow: 0 0 0 4px var(--bg-primary);
        }

        .timeline-item--current::before {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            animation: pulse 2s infinite;
        }

        .timeline-item__header {
            margin-bottom: 1.5rem;
        }

        .timeline-item__company {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .timeline-item__logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: white;
            padding: 0.5rem;
            border-radius: 0.75rem;
            box-shadow: var(--shadow-md);
        }

        .timeline-item__company-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .timeline-item__period {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .timeline-item__location {
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .timeline-item__content {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: var(--shadow-md);
        }

        .timeline-item__summary {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 1rem;
            line-height: 1.7;
        }

        .timeline-item__roles {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .role-item {
            border-left: 3px solid var(--primary-color);
            padding-left: 1.5rem;
        }

        .role-item__position {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .role-item__period {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .role-item__summary {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.7;
        }

        .role-item__achievements {
            list-style: none;
            margin-bottom: 1rem;
        }

        .role-item__achievements li {
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
            position: relative;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .role-item__achievements li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--primary-color);
            font-weight: 700;
        }

        .role-item__achievements strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .role-item__skills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .skill-tag {
            background: var(--bg-accent);
            color: var(--text-primary);
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .skill-tag--small {
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
        }

        .timeline-item__skills {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .timeline-item__skills h4 {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* Capabilities Section */
        .capabilities {
            background: var(--bg-primary);
        }

        .capability-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .capability-card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .capability-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-color);
        }

        .capability-card__header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .capability-card__icon {
            width: 3rem;
            height: 3rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .capability-card__title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .capability-card__description {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .capability-card__skills {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .capability-skill {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            background: var(--bg-secondary);
            border-radius: 0.5rem;
        }

        .capability-skill::before {
            content: '✓';
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1rem;
        }

        .capability-skill__name {
            color: var(--text-primary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Certifications Section */
        .certifications {
            background: var(--bg-secondary);
        }

        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .cert-card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
        }

        .cert-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
        }

        .cert-card__header {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .cert-card__badge {
            width: 3rem;
            height: 3rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .cert-card__badge--green { background: linear-gradient(135deg, #10b981, #059669); }
        .cert-card__badge--blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .cert-card__badge--purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .cert-card__badge--orange { background: linear-gradient(135deg, #f97316, #ea580c); }
        .cert-card__badge--teal { background: linear-gradient(135deg, #14b8a6, #0d9488); }

        .cert-card__title {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .cert-card__issuer {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .cert-card__description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .cert-card__verification {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
            transition: gap 0.3s ease;
        }

        .cert-card__verification:hover {
            gap: 0.75rem;
        }

        /* Education Section */
        .education {
            background: var(--bg-primary);
        }

        .education__items {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .education-item {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            border-left: 4px solid var(--primary-color);
            box-shadow: var(--shadow-md);
        }

        .education-item__header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.5rem;
        }

        .education-item__degree {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .education-item__period {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .education-item__field {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .education-item__institution {
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .education-item__description {
            color: var(--text-light);
            font-size: 0.875rem;
            line-height: 1.6;
        }

        /* Insights Section */
        .insights {
            background: var(--bg-secondary);
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .blog-card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
        }

        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
        }

        .blog-card__badge {
            display: inline-block;
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .blog-card__badge--blue { background: #dbeafe; color: #1e40af; }
        .blog-card__badge--purple { background: #ede9fe; color: #6b21a8; }
        .blog-card__badge--green { background: #d1fae5; color: #065f46; }
        .blog-card__badge--orange { background: #fed7aa; color: #9a3412; }

        .blog-card__title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .blog-card__description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .blog-card__link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: gap 0.3s ease;
        }

        .blog-card__link:hover {
            gap: 0.75rem;
        }

        /* Contact Section */
        .contact {
            background: var(--bg-primary);
        }

        .contact__content {
            max-width: 800px;
            margin: 0 auto;
        }

        .contact__details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .contact-detail {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 0.75rem;
        }

        .contact-detail i {
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .contact-detail a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .contact-detail a:hover {
            color: var(--primary-color);
        }

        .contact__quote {
            font-size: 1.25rem;
            font-style: italic;
            color: var(--text-secondary);
            text-align: center;
            margin: 2rem 0;
            padding: 2rem;
            background: var(--bg-secondary);
            border-radius: 1rem;
            border-left: 4px solid var(--primary-color);
        }

        .contact__availability {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 0.75rem;
            font-weight: 600;
        }

        .form__row {
            display: grid;
            gap: 1.5rem;
        }

        .form__group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form__label {
            font-weight: 600;
            color: var(--text-primary);
        }

        .form__input,
        .form__select {
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form__input:focus,
        .form__select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .form__input[type="submit"] {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            font-weight: 600;
            cursor: pointer;
            border: none;
            margin-top: 1rem;
        }

        .form__input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* Footer */
        .footer {
            background: var(--text-primary);
            color: white;
            padding: 3rem 0 1.5rem;
        }

        .footer__content {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 3rem;
            margin-bottom: 2rem;
        }

        .footer__logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .footer__tagline {
            opacity: 0.7;
            margin-bottom: 1.5rem;
        }

        .footer__socials {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .footer__social-link {
            color: white;
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.3s ease;
            font-size: 0.875rem;
        }

        .footer__social-link:hover {
            opacity: 1;
        }

        .footer__bottom {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0.7;
            font-size: 0.875rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(99, 102, 241, 0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero__content {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .hero__title {
                font-size: 2.5rem;
            }

            .hero__stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .about__content {
                grid-template-columns: 1fr;
            }

            .section__title {
                font-size: 2rem;
            }

            .timeline::before {
                left: 1rem;
            }

            .timeline-item {
                padding-left: 3.5rem;
            }

            .timeline-item::before {
                left: 0.75rem;
            }

            .footer__content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
