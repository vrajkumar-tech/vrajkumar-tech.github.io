    <!-- CSS -->
    <style>
        /* Minimal Classic Template Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
            color: #333;
            background: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: #2c3e50;
            color: white;
            padding: 2rem 0;
            text-align: center;
        }

        .header__content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .header__img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #3498db;
        }

        .header__text h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .header__text .title {
            font-size: 1.2rem;
            color: #3498db;
            margin-bottom: 0.5rem;
        }

        .header__text .tagline {
            font-size: 1rem;
            opacity: 0.9;
        }

        .header__contact {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .header__contact a {
            color: #3498db;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid #3498db;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .header__contact a:hover {
            background: #3498db;
            color: white;
        }

        /* Navigation */
        .nav {
            background: #34495e;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav__list {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 2rem;
        }

        .nav__link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        .nav__link:hover {
            background: #3498db;
        }

        /* Main Content */
        .main {
            padding: 2rem 0;
        }

        .section {
            margin-bottom: 3rem;
        }

        .section__title {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 1rem;
            border-bottom: 3px solid #3498db;
            padding-bottom: 0.5rem;
        }

        /* About Section */
        .about__content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .about__text {
            line-height: 1.8;
        }

        .about__highlights {
            display: grid;
            gap: 1rem;
        }

        .highlight-card {
            background: #f8f9fa;
            padding: 1rem;
            border-left: 4px solid #3498db;
        }

        .highlight-card h4 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        /* Experience Section */
        .experience-item {
            background: #f8f9fa;
            margin-bottom: 2rem;
            padding: 2rem;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }

        .experience-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .experience-company {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .experience-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .experience-info h3 {
            color: #2c3e50;
            font-size: 1.3rem;
        }

        .experience-info .period {
            color: #666;
            font-weight: 500;
        }

        .role-item {
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            border-left: 2px solid #ecf0f1;
        }

        .role-item h4 {
            color: #3498db;
            margin-bottom: 0.3rem;
        }

        .role-item .role-period {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .role-item ul {
            list-style: none;
            padding-left: 0;
        }

        .role-item li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .role-item li:before {
            content: "▸";
            position: absolute;
            left: 0;
            color: #3498db;
        }

        /* Skills Section */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .skill-category {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            border-top: 4px solid #3498db;
        }

        .skill-category h3 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .skill-list {
            list-style: none;
        }

        .skill-list li {
            padding: 0.3rem 0;
            border-bottom: 1px solid #ecf0f1;
        }

        .skill-list li:last-child {
            border-bottom: none;
        }

        /* Education & Certifications */
        .edu-cert-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .edu-item, .cert-item {
            background: #f8f9fa;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }

        .edu-item h4, .cert-item h4 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .edu-item .period, .cert-item .period {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        /* Contact Section */
        .contact-section {
            background: #2c3e50;
            color: white;
            padding: 2rem 0;
            text-align: center;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .contact-form {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 4px;
            font-family: inherit;
        }

        .btn {
            background: #3498db;
            color: white;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #2980b9;
        }

        /* Footer */
        .footer {
            background: #34495e;
            color: white;
            text-align: center;
            padding: 2rem 0;
        }

        .footer__content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .footer__links {
            display: flex;
            gap: 1rem;
        }

        .footer__links a {
            color: #3498db;
            text-decoration: none;
        }

        .footer__links a:hover {
            color: #5dade2;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .about__content,
            .edu-cert-grid {
                grid-template-columns: 1fr;
            }

            .header__content {
                flex-direction: column;
                text-align: center;
            }

            .nav__list {
                flex-wrap: wrap;
                gap: 1rem;
            }

            .experience-header {
                flex-direction: column;
            }

            .contact-info {
                flex-direction: column;
                align-items: center;
            }

            .footer__content {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>

    <title></title>
</head>
<body>
