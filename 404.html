<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        a {
            color: #fff;
            text-decoration: underline;
            font-weight: 600;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        p {
            margin: 0.5rem 0;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Redirecting...</h1>
        <p id="status">Processing request...</p>
    </div>

    <script>
        (function() {
            'use strict';

            const TARGET_DOMAIN = 'https://rkoots.github.io';
            const statusEl = document.getElementById('status');

            function updateStatus(message) {
                if (statusEl) {
                    statusEl.textContent = message;
                }
            }

            function showError(message, showLinks = true) {
                let errorHtml = `
                    <h1>⚠️ Page Not Found</h1>
                    <div class="error">
                        <p>${message}</p>
                `;

                if (showLinks) {
                    errorHtml += `
                        <p style="margin-top: 1rem;">
                            <a href="/">Go to homepage</a> | 
                            <a href="${TARGET_DOMAIN}">Visit rkoots.github.io</a>
                        </p>
                    `;
                }

                errorHtml += `</div>`;
                document.querySelector('.container').innerHTML = errorHtml;
            }

            function handleRedirect() {
                const currentPath = window.location.pathname;
                
                // Check if path starts with /rkoots/
                if (currentPath.startsWith('/rkoots/')) {
                    // Extract everything after /rkoots/
                    const targetPath = currentPath.substring('/rkoots/'.length);
                    
                    // Build target URL
                    const targetUrl = `${TARGET_DOMAIN}/${targetPath}${window.location.search}${window.location.hash}`;
                    
                    updateStatus(`Redirecting to ${TARGET_DOMAIN}...`);
                    console.log('Redirecting to:', targetUrl);
                    
                    // Redirect immediately
                    window.location.replace(targetUrl);
                } else if (currentPath === '/rkoots' || currentPath === '/rkoots/') {
                    // Redirect /rkoots to rkoots.github.io homepage
                    const targetUrl = `${TARGET_DOMAIN}/${window.location.search}${window.location.hash}`;
                    updateStatus(`Redirecting to ${TARGET_DOMAIN}...`);
                    console.log('Redirecting to:', targetUrl);
                    window.location.replace(targetUrl);
                } else {
                    // Regular 404 - page not found
                    showError(`The page "${currentPath}" was not found.`);
                }
            }

            // Execute immediately
            handleRedirect();
        })();
    </script>
</body>
</html>
